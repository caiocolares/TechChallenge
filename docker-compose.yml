services:
  db:
    image: postgres:16-alpine
    container_name: techchallenge-db
    environment:
      POSTGRES_DB: techchallenge
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d techchallenge"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.1
    container_name: techchallenge-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/techchallenge
      KC_DB_USERNAME: user
      KC_DB_PASSWORD: password

    ports:
      - "8081:8080"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: techchallenge-nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
#      - app
      - keycloak

